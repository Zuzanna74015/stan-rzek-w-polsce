<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <title>Ostrzeżenia hydrologiczne – IMGW</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light text-dark">
  <div class="container py-5">
    <h1 class="text-center mb-4">🚨 Ostrzeżenia Hydrologiczne</h1>
    <div id="ostrzezenia" class="row g-4 justify-content-center">
      <p class="text-center">Ładowanie danych...</p>
    </div>
    <div class="text-center mt-5">
      <a href="wybierz.html" class="btn btn-outline-primary">&larr; Wróć</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('https://danepubliczne.imgw.pl/api/data/warningshydro')
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('ostrzezenia');
          container.innerHTML = '';

          if (!data.length) {
            container.innerHTML = '<p class="text-center">Brak aktualnych ostrzeżeń.</p>';
            return;
          }

          data.forEach(entry => {
            const card = document.createElement('div');
            card.className = 'col-md-6';
            card.innerHTML = `
              <div class="card shadow-sm h-100">
                <div class="card-body">
                  <h5 class="card-title">🌍 ${entry.wojewodztwo || 'Nieznane województwo'}</h5>
                  <p class="card-text">
                    ⚠️ Typ: ${entry.rodzaj || 'Brak'}<br>
                    ⚖️ Stopień: ${entry.stopien || 'Brak'}<br>
                    ⏰ Od: ${entry.od || 'Brak'}<br>
                    ⏳ Do: ${entry.do || 'Brak'}<br>
                    ✉️ Komentarz: ${entry.tresc || 'Brak komentarza'}
                  </p>
                </div>
              </div>
            `;
            container.appendChild(card);
          });
        })
        .catch(err => {
          document.getElementById('ostrzezenia').innerHTML = '<p class="text-danger text-center">Błąd ładowania danych.</p>';
          console.error(err);
        });
    });
  </script>
</body>

</html>
